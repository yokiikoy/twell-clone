[project]
name = "cleanroom-pipeline"
version = "0.1.0"
description = "Open-license cleanroom wordlist pipeline (Sudachi, profiling, export)"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "numpy>=1.26",
  "SudachiPy>=0.6.8",
  "SudachiDict-core>=20240710",
]

[project.scripts]
cleanroom-pipeline = "cleanroom_pipeline.cli:main"

[project.optional-dependencies]
build = [
  "cutlet>=0.4",
  "unidic-lite>=1.0.8",
]
semantic = [
  "sentence-transformers>=3.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cleanroom_pipeline"]
force-include = { "heuristics" = "heuristics" }
