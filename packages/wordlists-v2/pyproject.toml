[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "wordlists-v2"
version = "0.1.0"
description = "Japanese typing wordlist build (v2 policy)"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "sudachipy>=0.6.8",
  "cutlet",
  "unidic-lite",
]

[project.optional-dependencies]
dev = ["pytest>=8"]

[project.scripts]
wordlists-v2 = "wordlists_v2.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
wordlists_v2 = ["open_corpora_manifest.json"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src", "../cleanroom-pipeline/src"]
markers = [
  "integration: network downloads or long pipeline",
]
